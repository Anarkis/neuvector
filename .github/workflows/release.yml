name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write is needed for:
      # - OIDC for cosign's use in ecm-distro-tools/publish-image.
      # - Read vault secrets in rancher-eio/read-vault-secrets.
      #id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Parse target tag
      run: |
        TARGET=${{ github.ref_name }}
        echo "TAG=${TARGET#v}" >> $GITHUB_ENV
  
  update-upgrade-responder:
      needs: publish
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Checkout external-production repository
          uses: actions/checkout@v4
          with:
            #repository: rancher-eio/external-production
            repository: anarkis/external-production
            ref: main
            token: ${{ secrets.GH_PAT }}
            path: external-production
            sparse-checkout: |
              manifests/upgrade-responder/resources/ConfigMap/upgrade-responder.json
            sparse-checkout-cone-mode: false

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        #- name: Install dependencies
          #run: |
            #python -m pip install --upgrade pip
            #pip install json
        - name: Test with pytest
          run: |
            python -c '
            import json
            data = {"Versions": [{"Name": "v2.1.1", "ReleaseDate": "2022-05-13T01:31:29.99Z", "Tags": ["latest", "2.1.1"]}]}
            with open(".github/upgrade-responder.json", "w") as f: json.dump(data, f, indent=2)
            '
        - name: Commit and push changes
          run: |
            ls -la
            cp .github/upgrade-responder.json external-production/
            git add upgrade-responder.json
            git commit -m "Automated commit by GitHub Actions"
            git push
            cd external-production/
            git add upgrade-responder.json
            git commit -m "Automated commit by GitHub Actions"
            git push 

        #check
        #if not sucess (EXTERNAL) create automated issue for EIO priority 1

        